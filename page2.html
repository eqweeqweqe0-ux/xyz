<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面2 - 返回</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #f44336;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #e53935;
        }
    </style>
</head>
<body>

    <h1>您已经跳转到了新页面！</h1>
    <button onclick="goBack()">返回上一页</button>

    <script>
        function goBack() {
            window.history.back(); // 返回上一页
        }
    </script>

</body>
</html>
