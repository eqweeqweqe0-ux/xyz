<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>确认按钮跳转示例</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
    <link rel="stylesheet" href="/xyz/styles.css"> <!-- 如果有外部CSS文件 -->
</head>
<body>

    <h1>欢迎来到确认按钮页面</h1>
    <button onclick="showConfirmation()">点击确认</button>

    <script>
        function showConfirmation() {
            const userConfirmed = confirm("您确定要跳转到新页面吗？");
            if (userConfirmed) {
                // 跳转到另一个页面
                window.location.href = "page2.html"; // 页面2的路径
            } else {
                // 如果取消，显示消息
                alert("您取消了操作。");
            }
        }
    </script>

</body>
</html>
